name: Send Vol2Vol Image to Telegram
on:
  schedule:
    - cron: '*/10 * * * *'  # ทำงานทุก 10 นาที
  workflow_dispatch:      # กดรันเองเพื่อทดสอบได้ทันที

jobs:
  send_image:
    runs-on: ubuntu-latest
    steps:
      - name: Send PNG from GitHub to Telegram
        run: |
          # 1. กำหนด URL ของรูปภาพแบบ Raw (แหล่งข้อมูลใหม่ของคุณ)
          IMAGE_URL="https://raw.githubusercontent.com/peeradontrader1-cpu/Vol2VolData/main/Intraday%2BOI.png"

          # 2. ส่งรูปภาพเข้า Telegram โดยใช้ Token และ ID ที่อยู่ใน Secrets
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F photo="$IMAGE_URL" \
            -F caption="📊 อัปเดตข้อมูล Vol2Vol (Intraday + OI) ล่าสุดครับ"
